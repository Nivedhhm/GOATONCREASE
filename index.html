<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IPL 2026 Teams</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .team-list button { margin: 5px; padding: 10px 15px; cursor:pointer; }
    .player-card { border:1px solid #ddd; padding:10px; margin:10px; width:240px; display:inline-block; vertical-align:top; text-align:center; }
    .player-card img { width:120px; height:120px; object-fit:cover; border-radius:50%; }
    .player-info { margin-top:8px; }
  </style>
</head>
<body>

  <h1>IPL 2026 TEAMS</h1>
  <div class="team-list"></div>
  <hr>
  <div class="team-details"></div>

  <script>
    // 📌 Team & Player Data (example for Rajasthan Royals)
    const teams = {
      "Rajasthan Royals": [
        { name: "Riyan Parag", role: "Batter / Captain", price: "INR 14 Cr", photo: "https://your-image-url.com/riyan.jpg" }
        { name: "Yashasvi Jaiswal", role: "Batter", price: "INR 18.00 Cr" },
        { name: "Shimron Hetmyer", role: "Batter", price: "INR 11 Cr"   },
        { name: "Dasun Shanaka", role: "All‑Rounder", price: "INR 2.00 Cr" },
        { name: "Ravindra Jadeja", role: "All‑Rounder", price: "INR 14.00 Cr" },
        { name: "Ravi Bishnoi", role: "Bowler", price: "INR 7.20 Cr" }
      ],
      
      "Chennai Super Kings": [
        { name: "Ruturaj Gaikwad", role: "Batter / Captain", price: "INR 8.00 Cr" },
        { name: "Moeen Ali", role: "All‑Rounder", price: "INR 5.75 Cr" },
        { name: "Shivam Dube", role: "All‑Rounder", price: "INR 3.20 Cr" },
        { name: "Deepak Chahar", role: "Bowler", price: "INR 6.00 Cr" },
        { name: "Matheesha Pathirana", role: "Bowler", price: "INR 15.00 Cr" }
      ],

      "Lucknow Super Giants": [
        { name: "KL Rahul", role: "Batter / Captain", price: "INR 17.00 Cr" },
        { name: "Quinton de Kock", role: "Wicketkeeper", price: "INR 12.00 Cr" },
        { name: "Marcus Stoinis", role: "All‑Rounder", price: "INR 9.00 Cr" },
        { name: "Kagiso Rabada", role: "Bowler", price: "INR 7.50 Cr" }
      ]
      // ➕ Add more IPL teams here using the same structure
    };

    // 🧠 Generate ESPN Image URL by Name
    function getESPNImage(name) {
      const formatted = name.toLowerCase().replace(/ /g, "-");
      return `https://www.espncricinfo.com/thumb/headshot/player/${formatted}.jpg`;
    }

    const teamListDiv = document.querySelector(".team-list");
    const teamDetailsDiv = document.querySelector(".team-details");

    // 1) List all teams
    Object.keys(teams).forEach(teamName => {
      const btn = document.createElement("button");
      btn.textContent = teamName;
      btn.onclick = () => showTeam(teamName);
      teamListDiv.appendChild(btn);
    });

    // 2) Show selected team
    function showTeam(name) {
      const players = teams[name];
      teamDetailsDiv.innerHTML = `<h2>${name}</h2>`;
      
      players.forEach(p => {
        const card = document.createElement("div");
        card.className = "player-card";

        const img = document.createElement("img");
        img.src = getESPNImage(p.name);
        img.onerror = () => img.src = "https://via.placeholder.com/120";

        card.innerHTML = `
          <div><strong>${p.name}</strong></div>
          <div class="player-info">${p.role}</div>
          <div class="player-info">${p.price}</div>
        `;
        card.prepend(img);

        teamDetailsDiv.appendChild(card);
      });
    }
  </script>

</body>
</html>
