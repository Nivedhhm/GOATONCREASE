<!DOCTYPE html>
<html>
<head>
  <title>Match Details</title>

  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .stats {
      font-weight: bold;
      margin: 10px 0;
    }

    .live-title {
      margin-top: 25px;
      font-size: 18px;
      font-weight: bold;
      color: red;
    }

    iframe {
      width: 100%;
      height: 250px;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <div id="content"></div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const matchIndex = params.get("match");

  const data = [
    {
      teams: "PBKS vs GT",
      stats: [
        "PBKS: 0 Trophies | 1 Final",
        "GT: 1 Trophy | 2 Finals",
        "Last Playoff: PBKS - 2014 | GT - 2023"
      ],
      live: "https://j-plus.free.nf/jtv/player_india.html?id=4470" // 👉 replace with your real live link
    },
    {
      teams: "LSG vs DC",
      stats: [
        "LSG: 0 Trophies",
        "DC: 0 Trophies | 1 Final",
        "Last Playoff: DC - 2021"
      ]
    },
    {
      teams: "KKR vs SRH",
      stats: [
        "KKR: 2 Trophies",
        "SRH: 1 Trophy",
        "Both regular playoff teams"
      ]
    }
  ];

  const match = data[matchIndex];

  let html = `<div class="title">${match.teams}</div>`;

  match.stats.forEach(stat => {
    html += `<div class="stats">${stat}</div>`;
  });

  // LIVE VIDEO only for first match (PBKS vs GT)
  if (match.live) {
    html += `
      <div class="live-title">🔴 LIVE VIDEO</div>
      <iframe src="${match.live}" allowfullscreen></iframe>
    `;
  }

  document.getElementById("content").innerHTML = html;
</script>

</body>
</html>
