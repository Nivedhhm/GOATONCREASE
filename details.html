<!DOCTYPE html>
<html>
<head>
  <title>Match Details</title>

  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: Arial;
      margin: 0;
    }

    .header {
      background: #0b3d91;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }

    .tabs {
      display: flex;
      justify-content: space-around;
      background: #111;
      padding: 10px;
    }

    .tab {
      cursor: pointer;
      font-weight: bold;
    }

    .content {
      padding: 20px;
      text-align: center;
    }

    .stats {
      margin: 10px 0;
      font-weight: bold;
    }

    .live-btn {
      display: inline-block;
      background: red;
      color: white;
      padding: 10px;
      border-radius: 8px;
      text-decoration: none;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>
const params = new URLSearchParams(window.location.search);
const matchIndex = params.get("match");

const matches = [
  {
    teams: "PBKS vs GT",
    venue: "New Chandigarh",
    stats: [
      "PBKS: 0 Trophies | 1 Final",
      "GT: 1 Trophy | 2 Finals",
      "Last Playoff: PBKS - 2014 | GT - 2023"
    ],
    live: "https://j-plus.free.nf/jtv/player_india.html?id=4470"
  },
  {
    teams: "LSG vs DC",
    venue: "Lucknow",
    stats: [
      "LSG: 0 Trophies",
      "DC: 0 Trophies | 1 Final",
      "Last Playoff: DC - 2021"
    ]
  },
  {
    teams: "KKR vs SRH",
    venue: "Kolkata",
    stats: [
      "KKR: 2 Trophies",
      "SRH: 1 Trophy"
    ]
  },
  {
    teams: "CSK vs PBKS",
    venue: "Chennai",
    stats: [
      "CSK: 5 Trophies",
      "PBKS: 0 Trophies"
    ]
  }
];

const match = matches[matchIndex];

let html = `
  <div class="header">${match.teams}</div>

  <div class="tabs">
    <div class="tab">Live</div>
    <div class="tab">Scorecard</div>
    <div class="tab">Info</div>
  </div>

  <div class="content">
`;

match.stats.forEach(stat => {
  html += `<div class="stats">${stat}</div>`;
});

// LIVE button only if link exists
if (match.live) {
  html += `
    <div style="margin-top:20px;">
      🔴 LIVE NOW
      <br>
      <a href="${match.live}" target="_blank" class="live-btn">
        Watch Live
      </a>
    </div>
  `;
}

html += `</div>`;

document.getElementById("app").innerHTML = html;
</script>

</body>
</html>}
