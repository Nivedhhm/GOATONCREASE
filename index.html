<!DOCTYPE html>
<html>
<head>
  <title>IPL 2026 Fixtures</title>

  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: Arial;
      padding: 10px;
    }

    h1 {
      text-align: center;
    }

    .match {
      background-color: #0b3d91; /* dark blue */
      color: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 12px;
      position: relative;
    }

    .teams {
      font-size: 18px;
      font-weight: bold;
    }

    .details {
      font-size: 14px;
      margin-top: 5px;
    }

    .more-btn {
      position: absolute;
      right: 10px;
      bottom: 10px;
      background: #ffffff;
      color: #0b3d91;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>

<body>

<h1>IPL 2026 Matches</h1>

<div id="matches"></div>

<script>
  const matches = [
    {
      date: "31-Mar-2026",
      teams: "PBKS vs GT",
      venue: "New Chandigarh",
      time: "7:30 PM"
    },
    {
      date: "01-Apr-2026",
      teams: "LSG vs DC",
      venue: "Lucknow",
      time: "7:30 PM"
    },
    {
      date: "02-Apr-2026",
      teams: "KKR vs SRH",
      venue: "Kolkata",
      time: "7:30 PM"
    },
    {
      date: "03-Apr-2026",
      teams: "CSK vs PBKS",
      venue: "Chennai",
      time: "7:30 PM"
    },
    {
      date: "04-Apr-2026",
      teams: "DC vs MI",
      venue: "Delhi",
      time: "3:30 PM"
    }
  ];

  const container = document.getElementById("matches");

  matches.forEach((match, index) => {
    container.innerHTML += `
      <div class="match">
        <div class="teams">${match.teams}</div>
        <div class="details">${match.date} | ${match.time}</div>
        <div class="details">${match.venue}</div>

        <a href="details.html?match=${index}" class="more-btn">
          More Details
        </a>
      </div>
    `;
  });
</script>

</body>
</html>
