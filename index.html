<!DOCTYPE html>
<html>
<head>
<title>IPL 2026</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
  text-align: center;
}

.title {
  font-size: 28px;
  margin: 20px 0;
}

.card {
  max-width: 500px;
  margin: auto;
  background: #1c1c1c;
  padding: 20px;
  border-radius: 15px;
}

.teams {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.team img {
  width: 60px;
}

.team-name {
  font-weight: bold;
  background: white;
  color: black;
  padding: 3px 6px;
  border-radius: 5px;
  margin-top: 5px;
}

.timer {
  font-size: 18px;
  font-weight: bold;
  color: #00ffcc;
}

.details {
  font-size: 13px;
  color: #ccc;
  margin-top: 10px;
  text-align: left;
}

.extra-section {
  display: flex;
  justify-content: space-between;
  max-width: 500px;
  margin: 15px auto;
}

.box {
  width: 32%;
  background: #1c1c1c;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 12px;
}

.dynamic {
  max-width: 500px;
  margin: auto;
  margin-top: 10px;
  background: #111;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
  text-align: left;
}
</style>

</head>

<body>

<div class="title">𝕀ℙ𝕃 𝕊𝔼𝔸𝕊𝕆ℕ ２０２６</div>

<div class="card">

  <div class="teams">

    <div class="team">
      <img src="https://image2url.com/r2/default/images/1775033260806-05136b32-16c3-43ee-9361-72f1123e0d41.png">
      <div class="team-name">LSG</div>
    </div>

    <div id="timer" class="timer"></div>

    <div class="team">
      <img src="https://image2url.com/r2/default/images/1775033240953-5ad236fd-9742-49ba-a72d-f5c328bbdb63.png">
      <div class="team-name">DC</div>
    </div>

  </div>

  <div class="details">
    📍 Venue: Lucknow<br>
    👨‍✈️ Captain: Rishabh Pant | Axar Patel<br>
    🧑‍🏫 Coach: Justin Langer | Ricky Ponting
  </div>

</div>

<div class="extra-section">
  <div class="box" onclick="showSection('squad')">𝐒𝐐𝐔𝐀𝐃</div>
  <div class="box" onclick="showSection('h2h')">HEAD TO HEAD</div>
  <div class="box" onclick="showSection('table')">POINTS TABLE</div>
</div>

<div id="dynamicContent" class="dynamic"></div>

<script>

// TIMER
const matchTime = new Date("2026-03-31T19:30:00").getTime();

function updateTimer() {
  const now = new Date().getTime();
  const diff = matchTime - now;

  if (diff <= 0) {
    document.getElementById("timer").innerHTML = "🔴 LIVE";
    return;
  }

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((diff%(1000*60*60))/(1000*60));
  const s = Math.floor((diff%(1000*60))/1000);

  document.getElementById("timer").innerHTML =
    d+"d "+h+"h "+m+"m "+s+"s";
}

setInterval(updateTimer, 1000);
updateTimer();


// CONTENT
function showSection(type) {
  let html = "";

  if (type === "squad") {
    html = `

<b>LSG Squad 2026</b><br><br>

<b>Batters:</b><br>
Aiden Markram, Himmat Singh, Akshat Raghuwanshi, Abdul Samad<br><br>

<b>Wicketkeepers:</b><br>
Rishabh Pant (C), Nicholas Pooran, Josh Inglis, Mukul Choudhary, Matthew Breetzke<br><br>

<b>All-Rounders:</b><br>
Mitchell Marsh, Wanindu Hasaranga, Shahbaz Ahmed, Ayush Badoni, Arshin Kulkarni<br><br>

<b>Bowlers:</b><br>
Mohammed Shami, Mayank Yadav, Avesh Khan, Anrich Nortje, Mohsin Khan, Siddharth, Arjun Tendulkar, Naman Tiwari, Prince Yadav, Digvesh Rathi, Akash Singh<br><br>


<b>DC Squad 2026</b><br><br>

<b>Batters:</b><br>
Nitish Rana, Pathum Nissanka, David Miller, Prithvi Shaw, Karun Nair, Sameer Rizvi, Sahil Parakh<br><br>

<b>Wicketkeepers:</b><br>
KL Rahul, Tristan Stubbs, Abishek Porel, Ben Duckett<br><br>

<b>All-Rounders:</b><br>
Axar Patel (C), Ashutosh Sharma, Ajay Mandal, Madhav Tiwari, Auqib Nabi<br><br>

<b>Bowlers:</b><br>
Kuldeep Yadav, Mitchell Starc, T Natarajan, Mukesh Kumar, Lungi Ngidi, Kyle Jamieson, Chameera, Vipraj Nigam, Tripurana Vijay

`;
  }

  if (type === "h2h") {
    html = `
<b>Total Matches:</b> 5<br>
<b>LSG Wins:</b> 3<br>
<b>DC Wins:</b> 2<br>
<b>No Result:</b> 0<br><br>

<b>Last 5:</b><br>
LSG won<br>
DC won<br>
LSG won<br>
LSG won<br>
DC won
`;
  }

  if (type === "table") {
    html = `
<b>IPL 2026 Points Table</b><br><br>

Team | M | W | L | NR | Pts<br><br>

RR | 1 | 1 | 0 | 0 | 2<br>
RCB | 1 | 1 | 0 | 0 | 2<br>
MI | 1 | 1 | 0 | 0 | 2<br>
PBKS | 1 | 1 | 0 | 0 | 2<br>
GT | 1 | 0 | 1 | 0 | 0<br>
KKR | 1 | 0 | 1 | 0 | 0<br>
SRH | 1 | 0 | 1 | 0 | 0<br>
CSK | 1 | 0 | 1 | 0 | 0<br>
DC | 0 | 0 | 0 | 0 | 0<br>
LSG | 0 | 0 | 0 | 0 | 0
`;
  }

  document.getElementById("dynamicContent").innerHTML = html;
}

</script>

</body>
</html>
