<!DOCTYPE html>
<html>
<head>
  <title>IPL Teams 2026</title>

  <style>
    body {
      background-color: #0d0d0d;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .card {
      background-color: #f5e6a3; /* light yellow */
      width: 260px;
      margin: 40px auto;
      padding: 15px;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
    }

    /* CSK logo background */
    .card::before {
      content: "";
      background: url("https://image2url.com/r2/default/images/1774798060147-f3c4831a-a019-4f72-8152-2fe0f19fbcaa.png") no-repeat center;
      background-size: 180px;
      opacity: 0.15; /* faded logo */
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    h3, p {
      color: #ffffff;
      margin: 5px 0;
    }
  </style>

</head>

<body>

<h1>IPL TEAMS 2026</h1>

<div class="card">
  <div class="content">
    <img src="https://image2url.com/r2/default/images/1774797094838-9bb0de4c-7b8c-4a42-87b2-493086273da5.png">

    <h3>Ruturaj Gaikwad (C)</h3>
    <p>Batsman</p>
    <p>Captain</p>
    <p>INR 18 Cr</p>
  </div>
</div>

</body>
</html>
