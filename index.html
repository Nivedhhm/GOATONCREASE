<!DOCTYPE html>
<html>
<head>
<title>IPL 2026</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
  text-align: center;
}

/* TITLE */
.title {
  font-size: 28px;
  margin: 20px 0;
  letter-spacing: 2px;
}

/* MATCH CARD */
.card {
  max-width: 500px;
  margin: auto;
  background: #1c1c1c;
  padding: 20px;
  border-radius: 15px;
}

/* TEAMS */
.teams {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.team {
  text-align: center;
}

.team img {
  width: 60px;
}

.team-name {
  font-weight: bold;
  margin-top: 5px;
}

/* TIMER */
.timer {
  font-size: 22px;
  margin: 15px 0;
  font-weight: bold;
  color: #00ffcc;
}

/* DETAILS */
.details {
  font-size: 13px;
  color: #ccc;
  margin-top: 10px;
  text-align: left;
}

/* LINK */
.link {
  display: block;
  margin-top: 15px;
  color: #00aaff;
  text-decoration: none;
}
</style>

</head>

<body>

<div class="title">𝕀ℙ𝕃 𝕊𝔼𝔸𝕊𝕆ℕ ２０２６</div>

<div class="card">

  <div class="teams">
    <div class="team">
      <img src="https://image2url.com/r2/default/images/1774798060147-f3c4831a-a019-4f72-8152-2fe0f19fbcaa.png">
      <div class="team-name">LSG</div>
    </div>

    <div class="team">
      <img src="https://image2url.com/r2/default/images/1774797094838-9bb0de4c-7b8c-4a42-87b2-493086273da5.png">
      <div class="team-name">DC</div>
    </div>
  </div>

  <!-- TIMER -->
  <div id="timer" class="timer"></div>

  <!-- DETAILS -->
  <div class="details">
    📍 Venue: Lucknow<br>
    👨‍✈️ Captain: KL Rahul | Rishabh Pant<br>
    🧑‍🏫 Coach: Justin Langer | Ricky Ponting
  </div>

  <!-- COMMENTARY LINK -->
  <a href="https://share.google/C7su7L9eoVv2Gu6Re" target="_blank" class="link">
    📺 View Commentary
  </a>

</div>

<script>
// MATCH TIME (SET YOUR MATCH TIME HERE)
const matchTime = new Date("2026-03-31T19:30:00").getTime();

function updateTimer() {
  const now = new Date().getTime();
  const diff = matchTime - now;

  if (diff <= 0) {
    document.getElementById("timer").innerHTML = "🔴 LIVE NOW";
    return;
  }

  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById("timer").innerHTML =
    hours + "h " + minutes + "m " + seconds + "s";
}

// RUN EVERY SECOND
setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
