<!DOCTYPE html>
<html>
<head>
<title>Live Match</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  background: black;
}

.video-container {
  position: relative;
  width: 100%;
  height: 100vh;
}

video {
  width: 100%;
  height: 100%;
}

/* WATERMARK */
.watermark {
  position: absolute;
  top: 20px;
  left: 20px;
  color: white;
  font-size: 22px;
  font-weight: bold;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="video-container">

  <video id="video" controls autoplay></video>

  <div class="watermark">SMITHIANERA</div>

</div>

<script>
var video = document.getElementById('video');
var videoSrc = "https://stream.pdtv.workers.dev/ratvottsports/netSTARSPORTS3HD1500.stream/playlist.m3u8";

if (Hls.isSupported()) {
  var hls = new Hls();
  hls.loadSource(videoSrc);
  hls.attachMedia(video);
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
  video.src = videoSrc;
}
</script>

</body>
</html>
