<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IPL TEAMS 2026</title>
  <style>
    body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background-color: #121212; /* dark background */
  color: #f0f0f0; /* light text */
}

.team-list button {
  margin: 5px;
  padding: 10px 15px;
  cursor: pointer;
  background-color: #1f1f1f; /* dark button */
  color: #f0f0f0; /* light text */
  border: 1px solid #333; /* subtle border */
  border-radius: 5px;
}

.team-list button:hover {
  background-color: #333; /* slightly lighter on hover */
}

.player-card {
  border: 1px solid #333; /* darker border */
  padding: 10px;
  margin: 10px;
  width: 240px;
  display: inline-block;
  vertical-align: top;
  text-align: center;
  background-color: #1e1e1e; /* dark card background */
  border-radius: 8px;
}

.player-card img {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 50%;
  border: 2px solid #444;
}

.player-info {
  margin-top: 8px;
}

h1, h2, h3 {
  color: #f0f0f0;
}

<h1>IPL TEAMS 2026</h1>
<div class="team-list"></div>
<hr>
<div class="team-details"></div>

<script>
  // IPL 2026 Teams and Players (only CSK included for now)
  const teams = {
    "Chennai Super Kings": {
      "Batters & Wicketkeepers": [
        { name: "Ruturaj Gaikwad (Captain)", role: "Batter / Captain", price: "INR 8 Cr", photo: "" },
        { name: "MS Dhoni (WK)", role: "Wicketkeeper", price: "INR 12 Cr", photo: "" },
        { name: "Sanju Samson (WK)", role: "Wicketkeeper", price: "INR 11 Cr", photo: "" },
        { name: "Dewald Brevis", role: "Batter", price: "INR 6 Cr", photo: "" },
        { name: "Ayush Mhatre", role: "Batter", price: "INR 0.5 Cr", photo: "" },
        { name: "Sarfaraz Khan", role: "Batter", price: "INR 1 Cr", photo: "" },
        { name: "Urvil Patel (WK)", role: "Wicketkeeper", price: "INR 0.3 Cr", photo: "" },
        { name: "Kartik Sharma (WK)", role: "Wicketkeeper", price: "INR 0.3 Cr", photo: "" }
      ],
      "All-Rounders": [
        { name: "Shivam Dube", role: "All-Rounder", price: "INR 5 Cr", photo: "" },
        { name: "Jamie Overton", role: "All-Rounder", price: "INR 4 Cr", photo: "" },
        { name: "Prashant Veer", role: "All-Rounder", price: "INR 0.3 Cr", photo: "" },
        { name: "Matthew Short", role: "All-Rounder", price: "INR 0.3 Cr", photo: "" },
        { name: "Aman Khan", role: "All-Rounder", price: "INR 0.3 Cr", photo: "" },
        { name: "Zak Foulkes", role: "All-Rounder", price: "INR 0.3 Cr", photo: "" },
        { name: "Ramakrishna Ghosh", role: "All-Rounder", price: "INR 0.3 Cr", photo: "" },
        { name: "Anshul Kamboj", role: "All-Rounder", price: "INR 0.3 Cr", photo: "" }
      ],
      "Bowlers": [
        { name: "Noor Ahmad", role: "Bowler", price: "INR 0.5 Cr", photo: "" },
        { name: "Khaleel Ahmed", role: "Bowler", price: "INR 0.8 Cr", photo: "" },
        { name: "Mukesh Choudhary", role: "Bowler", price: "INR 0.5 Cr", photo: "" },
        { name: "Rahul Chahar", role: "Bowler", price: "INR 7 Cr", photo: "" },
        { name: "Matt Henry", role: "Bowler", price: "INR 5 Cr", photo: "" },
        { name: "Akeal Hosein", role: "Bowler", price: "INR 3 Cr", photo: "" },
        { name: "Shreyas Gopal", role: "Bowler", price: "INR 0.3 Cr", photo: "" },
        { name: "Gurjapneet Singh", role: "Bowler", price: "INR 0.3 Cr", photo: "" },
        { name: "Spencer Johnson (Injury replacement for Nathan Ellis)", role: "Bowler", price: "INR 0.3 Cr", photo: "" }
      ]
    }
  };

  const teamListDiv = document.querySelector(".team-list");
  const teamDetailsDiv = document.querySelector(".team-details");

  // 1) Create buttons for all teams
  Object.keys(teams).forEach(teamName => {
    const btn = document.createElement("button");
    btn.textContent = teamName;
    btn.onclick = () => showTeam(teamName);
    teamListDiv.appendChild(btn);
  });

  // 2) Display players by category
  function showTeam(name) {
    const categories = teams[name];
    teamDetailsDiv.innerHTML = `<h2>${name}</h2>`;
    
    Object.keys(categories).forEach(categoryName => {
      const heading = document.createElement("h3");
      heading.textContent = categoryName;
      teamDetailsDiv.appendChild(heading);

      categories[categoryName].forEach(player => {
        const card = document.createElement("div");
        card.className = "player-card";

        const img = document.createElement("img");
        img.src = player.photo || "https://via.placeholder.com/120"; // placeholder if no photo
        img.alt = player.name;

        card.innerHTML = `
          <div><strong>${player.name}</strong></div>
          <div class="player-info">${player.role}</div>
          <div class="player-info">${player.price}</div>
        `;
        card.prepend(img);

        teamDetailsDiv.appendChild(card);
      });
    });
  }
</script>

</body>
</html>
