<!DOCTYPE html>
<html>
<head>
  <title>Match Details</title>

  <!-- HLS Player -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
    }

    .card {
      max-width: 500px;
      margin: 20px auto;
      background: #1c1c1c;
      border-radius: 15px;
      padding: 15px;
    }

    .title { color: #ccc; }
    .venue { font-size: 13px; color: #888; }

    hr { border: 0.5px solid #333; }

    .score-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .team img { width: 40px; }

    .score {
      font-size: 22px;
      font-weight: bold;
    }

    .result {
      text-align: center;
      margin: 10px 0;
      color: #aaa;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 8px;
      background: #111;
      border-radius: 20px;
      cursor: pointer;
    }

    .active {
      background: #333;
    }

    .content {
      margin-top: 15px;
    }

    .highlight {
      background: #111;
      padding: 8px;
      margin: 5px 0;
      border-radius: 6px;
    }

    /* VIDEO */
    video {
      width: 100%;
      border-radius: 10px;
    }

    .btns {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .btns button {
      width: 48%;
      padding: 10px;
      background: #222;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btns button.active {
      background: red;
    }

    /* TABLE */
    .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid #222;
    }

    .row span {
      flex: 1;
      text-align: center;
    }

    .row span:first-child {
      text-align: left;
    }

    .header {
      font-weight: bold;
      color: #888;
    }

    .section-title {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>
const match = {
  league: "IPL 2026",
  venue: "Mohali",

  team1: {
    short: "GT",
    logo: "https://image2url.com/r2/default/images/1774798060147-f3c4831a-a019-4f72-8152-2fe0f19fbcaa.png",
    score: "162/6"
  },

  team2: {
    short: "PBKS",
    logo: "https://image2url.com/r2/default/images/1774797094838-9bb0de4c-7b8c-4a42-87b2-493086273da5.png",
    score: "165/7"
  },

  result: "PBKS won by 3 wickets",

  highlights: [
    "PBKS chased successfully",
    "Connolly 72 match-winning knock",
    "Gill gave strong start"
  ],

  players: {
    batters: [
      {name:"Connolly", r:72, b:44, sr:163.64},
      {name:"Gill", r:39, b:27, sr:144.44}
    ],
    bowlers: [
      {name:"Prasidh", w:3, r:29, econ:7.25},
      {name:"Vyshak", w:3, r:34, econ:8.50}
    ]
  }
};

function showTab(tab) {
  let html = "";

  if (tab === "highlights") {
    html += `
      <video id="player" controls></video>

      <div class="btns">
        <button onclick="changeLang('hindi')">Hindi</button>
        <button onclick="changeLang('english')">English</button>
      </div>
    `;

    match.highlights.forEach(h => {
      html += `<div class="highlight">${h}</div>`;
    });
  }

  if (tab === "players") {

    html += `<div class="section-title">Top Batters</div>`;

    html += `<div class="row header">
      <span>Name</span>
      <span>R</span>
      <span>B</span>
      <span>SR</span>
    </div>`;

    match.players.batters.forEach(p => {
      html += `<div class="row">
        <span>${p.name}</span>
        <span>${p.r}</span>
        <span>${p.b}</span>
        <span>${p.sr}</span>
      </div>`;
    });

    html += `<div class="section-title">Top Bowlers</div>`;

    html += `<div class="row header">
      <span>Name</span>
      <span>W</span>
      <span>R</span>
      <span>Econ</span>
    </div>`;

    match.players.bowlers.forEach(p => {
      html += `<div class="row">
        <span>${p.name}</span>
        <span>${p.w}</span>
        <span>${p.r}</span>
        <span>${p.econ}</span>
      </div>`;
    });
  }

  document.getElementById("content").innerHTML = html;

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");

  if (tab === "highlights") {
    changeLang("hindi");
  }
}

function loadVideo(url) {
  const video = document.getElementById("player");

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
}

function changeLang(lang) {
  const buttons = document.querySelectorAll(".btns button");
  buttons.forEach(b => b.classList.remove("active"));

  if (lang === "hindi") {
    loadVideo("https://vod01.akt.hotstar-cdn.net/videos/cricket/inallow-ipl-2026-1540066046/1540066047/204a63c177cb4ab8bbedc5d05cdd6a26/index_7.m3u8");
    buttons[0].classList.add("active");
  } else {
    loadVideo("https://vod01.akt.hotstar-cdn.net/videos/cricket/inallow-ipl-2026-1540066046/1540066047/6ea0566b60b64ef9821f196777982758/index_7.m3u8");
    buttons[1].classList.add("active");
  }
}

document.getElementById("app").innerHTML = `
  <div class="card">
    <div class="title">${match.league}</div>
    <div class="venue">${match.venue}</div>
    <hr>

    <div class="score-box">
      <div class="team">
        <img src="${match.team1.logo}">
        <div>${match.team1.short}</div>
      </div>

      <div class="score">${match.team1.score}</div>
      <div class="score">${match.team2.score}</div>

      <div class="team">
        <img src="${match.team2.logo}">
        <div>${match.team2.short}</div>
      </div>
    </div>

    <div class="result">${match.result}</div>

    <div class="tabs">
      <div id="highlights" class="tab active" onclick="showTab('highlights')">Highlights</div>
      <div id="players" class="tab" onclick="showTab('players')">BEST PLAYERS</div>
    </div>

    <div id="content" class="content"></div>
  </div>
`;

showTab("highlights");
</script>

</body>
</html>
