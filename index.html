<!DOCTYPE html>
<html>
<head>
  <title>IPL 2026 Fixtures</title>

  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: Arial;
      padding: 10px;
    }

    h1 {
      text-align: center;
    }

    .match {
      background-color: #0b3d91; /* dark blue */
      color: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 12px;
      position: relative;
    }

    .teams {
      font-size: 18px;
      font-weight: bold;
    }

    .details {
      font-size: 14px;
      margin-top: 5px;
    }

    .more-btn {
      position: absolute;
      right: 10px;
      bottom: 10px;
      background: #ffffff;
      color: #0b3d91;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>

<body>

<h1>IPL 2026 Matches</h1>

<div id="matches"></div>

<script>
  const matches = [
    {
      dateTime: "2026-03-31T19:30:00",
      teams: "PBKS vs GT",
      venue: "New Chandigarh"
    },
    {
      dateTime: "2026-04-01T19:30:00",
      teams: "LSG vs DC",
      venue: "Lucknow"
    },
    {
      dateTime: "2026-04-02T19:30:00",
      teams: "KKR vs SRH",
      venue: "Kolkata"
    },
    {
      dateTime: "2026-04-03T19:30:00",
      teams: "CSK vs PBKS",
      venue: "Chennai"
    }
  ];

  const container = document.getElementById("matches");

  function createMatchCards() {
    container.innerHTML = "";

    matches.forEach((match, index) => {
      const matchTime = new Date(match.dateTime).getTime();
      const now = new Date().getTime();
      const diff = matchTime - now;

      let timerText = "";

      if (diff > 0) {
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);

        timerText = `${days}d ${hours}h ${minutes}m left`;
      } else {
        timerText = "Match Started / Finished";
      }

      container.innerHTML += `
        <div class="match">
          <div class="teams">${match.teams}</div>
          <div class="details">${new Date(match.dateTime).toLocaleString()}</div>
          <div class="details">${match.venue}</div>
          <div class="details" style="color: yellow;">⏳ ${timerText}</div>

          <a href="details.html?match=${index}" class="more-btn">
            More Details
          </a>
        </div>
      `;
    });
  }

  createMatchCards();
  setInterval(createMatchCards, 1000);
</script>

</body>
</html>
