<!DOCTYPE html>
<html>
<head>
<title>IPL 2026</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
  text-align: center;
}

/* TITLE */
.title {
  font-size: 28px;
  margin: 20px 0;
}

/* CARD */
.card {
  max-width: 500px;
  margin: auto;
  background: #1c1c1c;
  padding: 20px;
  border-radius: 15px;
}

/* TEAMS */
.teams {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.team img {
  width: 60px;
}

.team-name {
  font-weight: bold;
}

/* TIMER */
.timer {
  font-size: 22px;
  margin: 15px 0;
  font-weight: bold;
  color: #00ffcc;
}

/* DETAILS */
.details {
  font-size: 13px;
  color: #ccc;
  margin-top: 10px;
  text-align: left;
}

/* LINK */
.link {
  display: block;
  margin-top: 15px;
  color: #00aaff;
  text-decoration: none;
}

/* EXTRA SECTION */
.extra-section {
  display: flex;
  justify-content: space-between;
  max-width: 500px;
  margin: 15px auto;
}

.box {
  width: 32%;
  background: #1c1c1c;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 12px;
}

/* DYNAMIC CONTENT */
.dynamic {
  max-width: 500px;
  margin: auto;
  margin-top: 10px;
  background: #111;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
  text-align: left;
}
</style>

</head>

<body>

<div class="title">𝕀ℙ𝕃 𝕊𝔼𝔸𝕊𝕆ℕ ２０２６</div>

<div class="card">

  <div class="teams">
    <div class="teams">
  <div class="team">
    <img src="https://image2url.com/r2/default/images/1775033260806-05136b32-16c3-43ee-9361-72f1123e0d41.png">
    <div class="team-name">LSG</div>
  </div>

  <div class="team">
    <img src="https://image2url.com/r2/default/images/1775033240953-5ad236fd-9742-49ba-a72d-f5c328bbdb63.png">
    <div class="team-name">DC</div>
  </div>
    </div>

  <div id="timer" class="timer"></div>

  <div class="details">
    📍 Venue: Lucknow<br>
    👨‍✈️ Captain: Rishabh pant | Axar patel<br>
    🧑‍🏫 Coach: Justin Langer | Hemang Badani
  </div>

  <a href="https://share.google/C7su7L9eoVv2Gu6Re" target="_blank" class="link">
    📺 View Commentary
  </a>

</div>

<!-- 🔥 EXTRA FEATURES -->
<div class="extra-section">
  <div class="box" onclick="showSection('squad')">𝐒𝐐𝐔𝐀𝐃</div>
  <div class="box" onclick="showSection('h2h')">HEAD TO HEAD</div>
  <div class="box" onclick="showSection('table')">POINTS TABLE</div>
</div>

<div id="dynamicContent" class="dynamic"></div>

<script>

// TIMER
const matchTime = new Date("2026-03-31T19:30:00").getTime();

function updateTimer() {
  const now = new Date().getTime();
  const diff = matchTime - now;

  if (diff <= 0) {
    document.getElementById("timer").innerHTML = "🔴 LIVE NOW";
    return;
  }

  const h = Math.floor(diff / (1000 * 60 * 60));
  const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const s = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById("timer").innerHTML = h + "h " + m + "m " + s + "s";
}

setInterval(updateTimer, 1000);
updateTimer();


// CLICK SECTIONS
function showSection(type) {
  let html = "";

  if (type === "squad") {
    html = `
    <b>LSG Squad</b><br>
    KL Rahul, de Kock, Stoinis, Pooran<br><br>

    <b>DC Squad</b><br>
    Pant, Warner, Shaw, Axar
    `;
  }

  if (type === "h2h") {
    html = `
    <b>Total Matches:</b> 5<br>
    <b>LSG Wins:</b> 3<br>
    <b>DC Wins:</b> 2<br>
    <b>No Result:</b> 0<br><br>

    <b>Last 5 Matches:</b><br>
    LSG won<br>
    DC won<br>
    LSG won<br>
    LSG won<br>
    DC won
    `;
  }

  if (type === "table") {
    html = `
    <b>IPL 2026 Points Table</b><br><br>

    1. RR - 2 pts<br>
    2. RCB - 2 pts<br>
    3. MI - 2 pts<br>
    4. PBKS - 2 pts<br>
    5. GT - 0 pts<br>
    6. KKR - 0 pts<br>
    7. SRH - 0 pts<br>
    8. CSK- 0 pts<br>
    9. DC - 0 pts<br>
    10.LSG- 0 pts<br>
    `;
  }

  document.getElementById("dynamicContent").innerHTML = html;
}

</script>

</body>
</html>
