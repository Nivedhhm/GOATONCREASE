<!DOCTYPE html>
<html>
<head>
<title>Match Details</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

/* MAIN CARD */
.card {
  max-width: 500px;
  margin: 20px auto;
  background: #1c1c1c;
  border-radius: 15px;
  padding: 15px;
}

/* HEADER */
.title {
  font-size: 18px;
  color: #ccc;
}

.venue {
  font-size: 13px;
  color: #888;
  margin-bottom: 10px;
}

hr {
  border: 0.5px solid #333;
}

/* SCORE AREA */
.score-box {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.team {
  text-align: center;
  width: 30%;
}

.team img {
  width: 40px;
}

.score {
  font-size: 28px;
  font-weight: bold;
}

.result {
  text-align: center;
  margin: 10px 0;
  color: #aaa;
}

/* TABS */
.tabs {
  display: flex;
  justify-content: space-between;
  background: #000;
  border-radius: 25px;
  padding: 5px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 8px;
  border-radius: 20px;
  cursor: pointer;
}

.active {
  background: #333;
}

/* CONTENT */
.content {
  margin-top: 15px;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #222;
  font-size: 14px;
}

.highlight {
  padding: 8px;
  margin: 5px 0;
  background: #111;
  border-radius: 6px;
}

.ball {
  padding: 8px;
  margin: 5px 0;
  background: #111;
  border-left: 3px solid #0b3d91;
  border-radius: 6px;
}
.section-title {
  margin-top: 15px;
  font-weight: bold;
  color: #ccc;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #222;
  font-size: 13px;
}

.row span {
  flex: 1;
  text-align: center;
}

.row span:first-child {
  text-align: left;
}

.header {
  font-weight: bold;
  color: #888;
}
.video-box {
  margin-bottom: 15px;
  background: #111;
  padding: 10px;
  border-radius: 10px;
}

.video-title {
  color: white;
  font-weight: bold;
  margin-bottom: 8px;
}

video {
  width: 100%;
  border-radius: 8px;
}

.lang-buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.lang-buttons button {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #222;
  color: white;
  cursor: pointer;
}

.lang-buttons button:hover {
  background: #444;
}
</style>
</head>

<body>

<div id="app"></div>



</body>
</html>
<script>
const match = {
  league: "Indian Premier League",
  venue: "Punjab Cricket Association Stadium, Mohali",

  team1: {
    name: "Gujarat Titans",
    short: "GT",
    logo: "https://image2url.com/r2/default/images/1774798060147-f3c4831a-a019-4f72-8152-2fe0f19fbcaa.png",
    score: "162/6 (20)"
  },

  team2: {
    name: "Punjab Kings",
    short: "PBKS",
    logo: "https://image2url.com/r2/default/images/1774797094838-9bb0de4c-7b8c-4a42-87b2-493086273da5.png",
    score: "165/7 (19.1)"
  },

  result: "PBKS won by 3 wickets",

  highlights: [
    "PBKS chased 162 successfully",
    "Cooper Connolly played match-winning knock (72)",
    "Gill gave strong start",
    "Game turned in 18th over",
    "Excellent finishing by PBKS lower order"
  ],

  bestPlayers: {
    batters: [
      { name: "Cooper Connolly (PBKS)", r: 72, b: 44, fours: 5, sixes: 5, sr: 163.64 },
      { name: "Shubman Gill (GT)", r: 39, b: 27, fours: 6, sixes: 0, sr: 144.44 }
    ],
    bowlers: [
      { name: "Prasidh Krishna (GT)", o: 4, m: 0, r: 29, w: 3, econ: 7.25 },
      { name: "Vijaykumar Vyshak (PBKS)", o: 4, m: 0, r: 34, w: 3, econ: 8.5 }
    ]
  }
};

function showTab(tab) {
  let html = "";

  if (tab === "highlights") {

  html += `
    <div class="video-box">
      <div class="video-title">Match Highlights</div>

      <video id="player" controls autoplay>
        <source src="https://vod01.akt.hotstar-cdn.net/videos/cricket/inallow-ipl-2026-1540066046/1540066047/6ea0566b60b64ef9821f196777982758/index_7.m3u8" type="application/x-mpegURL">
      </video>

      <div class="lang-buttons">
        <button onclick="changeLang('hindi')">Hindi</button>
        <button onclick="changeLang('english')">English</button>
      </div>
    </div>
  `;

  match.highlights.forEach(h => {
    html += `<div class="highlight">${h}</div>`;
  });
  }
  if (tab === "players") {
    html += `<div class="section-title">Top Batters</div>`;

    html += `<div class="row header">
      <span>Name</span><span>R</span><span>B</span><span>4s</span><span>6s</span><span>SR</span>
    </div>`;

    match.bestPlayers.batters.forEach(p => {
      html += `<div class="row">
        <span>${p.name}</span>
        <span>${p.r}</span>
        <span>${p.b}</span>
        <span>${p.fours}</span>
        <span>${p.sixes}</span>
        <span>${p.sr}</span>
      </div>`;
    });

    html += `<div class="section-title">Top Bowlers</div>`;

    html += `<div class="row header">
      <span>Name</span><span>O</span><span>M</span><span>R</span><span>W</span><span>Econ</span>
    </div>`;

    match.bestPlayers.bowlers.forEach(p => {
      html += `<div class="row">
        <span>${p.name}</span>
        <span>${p.o}</span>
        <span>${p.m}</span>
        <span>${p.r}</span>
        <span>${p.w}</span>
        <span>${p.econ}</span>
      </div>`;
    });
  }

  document.getElementById("content").innerHTML = html;

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

document.getElementById("app").innerHTML = `
  <div class="card">

    <div class="title">${match.league}</div>
    <div class="venue">${match.venue}</div>

    <hr>

    <div class="score-box">
      <div class="team">
        <img src="${match.team1.logo}">
        <div>${match.team1.short}</div>
      </div>

      <div class="score">${match.team1.score}</div>

      <div class="score">${match.team2.score}</div>

      <div class="team">
        <img src="${match.team2.logo}">
        <div>${match.team2.short}</div>
      </div>
    </div>

    <div class="result">${match.result}</div>

    <div class="tabs">
      <div id="highlights" class="tab active" onclick="showTab('highlights')">Highlights</div>
      <div id="players" class="tab" onclick="showTab('players')">BEST PLAYERS</div>
    </div>

    <div id="content" class="content"></div>

  </div>
`;
function changeLang(lang) {
  const player = document.getElementById("player");

  if (lang === "hindi") {
    player.src = "https://vod01.akt.hotstar-cdn.net/videos/cricket/inallow-ipl-2026-1540066046/1540066047/6ea0566b60b64ef9821f196777982758/index_7.m3u8";
  } else {
    player.src = "https://vod01.akt.hotstar-cdn.net/videos/cricket/inallow-ipl-2026-1540066046/1540066047/204a63c177cb4ab8bbedc5d05cdd6a26/index_7.m3u8";
  }

  player.play();
}
showTab("highlights");
</script>
