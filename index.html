<!DOCTYPE html>
<html>
<head>
  <title>IPL Teams 2026</title>

  <style>
    body {
      background-color: #0d0d0d;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .card {
      background-color: #ffd700; /* yellow */
      color: white;
      width: 250px;
      margin: 40px auto;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .name {
      font-weight: bold;
      margin-top: 10px;
    }
  </style>

</head>

<body>

<h1>IPL TEAMS 2026</h1>

<div class="card">
  <img src="https://www.iplt20.com/stats/2021.jpg" alt="Ruturaj Gaikwad">

  <div class="name">Ruturaj Gaikwad (C)</div>
  <div>Position: Batsman</div>
  <div>Captain</div>
  <div>Price: INR 18 Cr</div>
</div>

</body>
</html>
