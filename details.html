<!DOCTYPE html>
<html>
<head>
  <title>Match Details</title>

  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: Arial;
      margin: 0;
    }

    .header {
      background: #0b3d91;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }

    .tabs {
      display: flex;
      justify-content: space-around;
      background: #111;
      padding: 10px;
    }

    .tab {
      cursor: pointer;
      font-weight: bold;
    }

    .content {
      padding: 20px;
      text-align: center;
    }

    .stats {
      margin: 10px 0;
      font-weight: bold;
    }

    .highlight {
  background: #1a1a1a;
  padding: 10px;
  margin: 8px 0;
  border-left: 4px solid yellow;
  border-radius: 6px;
  text-align: left;
}

.ball {
  background: #111;
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
  text-align: left;
  font-size: 14px;
  border-left: 3px solid #0b3d91;
}

.tab.active {
  color: yellow;
}
  </style>
</head>

<body>

<div id="app"></div>

<script>
const params = new URLSearchParams(window.location.search);
const matchIndex = params.get("match");

const matches = [
  {
    teams: "PBKS vs GT",
    venue: "New Chandigarh",

    highlights: [
      "PBKS scored 156/6 in 20 overs",
      "GT strong start in chase",
      "Shubman Gill leading from front",
      "Match turning point: 15th over"
    ],

    commentary: [
      "0.1: Arshdeep to Gill, dot ball",
      "0.2: FOUR! Beautiful cover drive",
      "0.3: Single taken",
      "0.4: WICKET! Edge to keeper",
      "0.5: Dot ball",
      "0.6: SIX! Massive hit over midwicket",

      "1.1: Rabada to Sudharsan, single",
      "1.2: FOUR! Cut shot",
      "1.3: Dot ball",
      "1.4: Two runs",
      "1.5: WICKET! Bowled him",
      "1.6: Dot ball"
    ]
  },

  {
    teams: "LSG vs DC",
    venue: "Lucknow",

    highlights: [
      "Match yet to start",
      "Pitch looks batting friendly"
    ],

    commentary: [
      "Match not started"
    ]
  }
];

const match = matches[matchIndex];

function showTab(tab) {
  let content = "";

  if (tab === "highlights") {
    match.highlights.forEach(h => {
      content += `<div class="highlight">${h}</div>`;
    });
  }

  if (tab === "commentary") {
    match.commentary.forEach(c => {
      content += `<div class="ball">${c}</div>`;
    });
  }

  document.getElementById("content").innerHTML = content;
}

document.getElementById("app").innerHTML = `
  <div class="header">${match.teams}</div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('highlights')">Highlights</div>
    <div class="tab" onclick="showTab('commentary')">Commentary</div>
  </div>

  <div id="content" class="content"></div>
`;

showTab("highlights");
</script>

</body>
</html>}
