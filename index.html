<!DOCTYPE html>
<html>
<head>
<title>IPL 2026</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
  text-align: center;
}

.title {
  font-size: 28px;
  margin: 20px 0;
}

.card {
  max-width: 500px;
  margin: auto;
  background: #1c1c1c;
  padding: 20px;
  border-radius: 15px;
}

.teams {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.team img {
  width: 60px;
}

.team-name {
  font-weight: bold;
  background: white;
  color: black;
  padding: 3px 6px;
  border-radius: 5px;
  margin-top: 5px;
}

.timer {
  font-size: 16px;
  font-weight: bold;
  color: #00ffcc;
}

.details {
  font-size: 13px;
  color: #ccc;
  margin-top: 10px;
  text-align: left;
}

.extra-section {
  display: flex;
  justify-content: space-between;
  max-width: 500px;
  margin: 15px auto;
}

.box {
  width: 32%;
  background: #1c1c1c;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.dynamic {
  max-width: 500px;
  margin: auto;
  margin-top: 10px;
  background: #111;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
  text-align: left;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid #333;
}

th {
  background: #222;
}
</style>

</head>

<body>

<div class="title">𝕀ℙ𝕃 𝕊𝔼𝔸𝕊𝕆ℕ ２０２６</div>

<div class="card">

    <div class="team">

      <div class="team-name">LSG</div>
    </div>

    <div id="timer" class="timer"></div>

    <div class="team">
      <img src="https://image2url.com/r2/default/images/1775033240953-5ad236fd-9742-49ba-a72d-f5c328bbdb63.png">
      <div class="team-name">DC</div>
    </div>

  </div>

  <div class="details">
    📍 Venue: Lucknow<br>
    👨‍✈️ Captain: Rishabh Pant | Axar Patel<br>
    🧑‍🏫 Coach: Justin Langer | Ricky Ponting
  </div>

</div>

<div class="extra-section">
  <div class="box" onclick="showSection('squad')">𝐒𝐐𝐔𝐀𝐃</div>
  <div class="box" onclick="showSection('h2h')">HEAD TO HEAD</div>
  <div class="box" onclick="showSection('table')">POINTS TABLE</div>
</div>

<div id="dynamicContent" class="dynamic"></div>

<script>

// TIMER
const matchTime = new Date("2026-04-01T19:30:00+05:30");
const liveLink = "https://www.cricbuzz.com/live-cricket-scores/149662/lsg-vs-dc-5th-match-indian-premier-league-2026";

function updateTimer() {
  const now = new Date().getTime();
  const diff = matchTime.getTime() - now;
  const el = document.getElementById("timer");

  if (diff <= 0) {
    el.innerHTML = `
    <a href="${liveLink}" target="_blank"
    style="background:red;padding:8px 12px;border-radius:8px;color:white;text-decoration:none;font-weight:bold;">
    🔴 LIVE SCORECARD
    </a>`;
    return;
  }

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((diff%(1000*60*60))/(1000*60));
  const s = Math.floor((diff%(1000*60))/1000);

  const options = { weekday:'long', day:'numeric', month:'long' };
  const dateStr = matchTime.toLocaleDateString('en-IN', options);

  el.innerHTML = dateStr + "<br>" + d+"d "+h+"h "+m+"m "+s+"s";
}

setInterval(updateTimer,1000);
updateTimer();


// SECTIONS
